<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Dojo · Capture flow</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #ededed; font-family: 'Inter', system-ui, sans-serif; }
  body { min-height: 100vh; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="library.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { IOSDevice } = window;
  const { DojoFlow, DOJO_W, DOJO_H, LibraryScreen, ClusterScreen, BoardScreen } = window;

  function Frame({ initial }) {
    return (
      <IOSDevice width={DOJO_W} height={DOJO_H} dark={true} hideStatusBar={false}>
        <div style={{ position: 'absolute', inset: 0 }}>
          <DojoFlow initial={initial} />
        </div>
      </IOSDevice>
    );
  }

  function ScreenFrame({ children, dark = false }) {
    return (
      <IOSDevice width={DOJO_W} height={DOJO_H} dark={dark} hideStatusBar={false}>
        <div style={{ position: 'absolute', inset: 0 }}>{children}</div>
      </IOSDevice>
    );
  }

  function App() {
    // Artboard sizing: device frame is ~432 wide × ~880 tall after bezels.
    // Give some padding so the device doesn't kiss the artboard edge.
    const W = 470, H = 940;
    return (
      <DesignCanvas>
        <DCSection id="flow" title="DOJO · CAPTURE FLOW" subtitle="Three connected screens — camera, decision, classify. Tap through any artboard to drive the real flow.">
          <DCArtboard id="camera" label="Camera" width={W} height={H}>
            <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#0a0a0a' }}>
              <Frame initial="camera" />
            </div>
          </DCArtboard>
          <DCArtboard id="preview" label="Preview · Discard or keep" width={W} height={H}>
            <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#0a0a0a' }}>
              <Frame initial="preview" />
            </div>
          </DCArtboard>
          <DCArtboard id="classify" label="Classify · Tag before filing" width={W} height={H}>
            <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#0a0a0a' }}>
              <Frame initial="classify" />
            </div>
          </DCArtboard>
          <DCArtboard id="judge" label="Judge · Is this good?" width={W} height={H}>
            <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#0a0a0a' }}>
              <Frame initial="judge" />
            </div>
          </DCArtboard>
        </DCSection>
        <DCSection id="library" title="02 · The library" subtitle="Where filed references live — clusters, recents, and pattern insight.">
          <DCArtboard id="library-screen" label="Library · Home" width={W} height={H}>
            <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#0a0a0a' }}>
              <ScreenFrame>
                <LibraryScreen onOpenCluster={() => {}} onCapture={() => {}} />
              </ScreenFrame>
            </div>
          </DCArtboard>
          <DCArtboard id="cluster-screen" label="Cluster · Metal doors / high contrast" width={W} height={H}>
            <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#0a0a0a' }}>
              <ScreenFrame>
                <ClusterScreen onBack={() => {}} />
              </ScreenFrame>
            </div>
          </DCArtboard>
          <DCArtboard id="board-screen" label="Board · Editorial moodboard" width={W} height={H}>
            <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#0a0a0a' }}>
              <ScreenFrame>
                <BoardScreen onBack={() => {}} />
              </ScreenFrame>
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
